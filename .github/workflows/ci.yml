name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: https://wizemail.mikdam.com

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: https://wizemail.mikdam.com
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Package standalone artifact
        run: |
          # Copy public assets and static files into standalone
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          # Remove node_modules from standalone — cPanel manages these via symlink
          rm -rf .next/standalone/node_modules
          rm -rf .next/standalone/.next/server/chunks/node_modules

      - name: Upload standalone folder via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude=node_modules
          path: .next/standalone/
          remote_path: ${{ secrets.CPANEL_DEPLOY_PATH }}/standalone/
          remote_host: ${{ secrets.CPANEL_SSH_HOST }}
          remote_port: ${{ secrets.CPANEL_SSH_PORT }}
          remote_user: ${{ secrets.CPANEL_SSH_USER }}
          remote_key: ${{ secrets.CPANEL_SSH_KEY }}

      - name: Restart Node app on cPanel
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: ${{ secrets.CPANEL_SSH_PORT }}
          script: |
            cd ${{ secrets.CPANEL_DEPLOY_PATH }}
            touch tmp/restart.txt 2>/dev/null || true
